name: Daily feedback digest

on:
  schedule:
    # 09:00 Beijing = 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect beta feedback
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/collect-beta-feedback.sh scripts/post-daily-digest-issue.sh
          bash scripts/collect-beta-feedback.sh

      - name: Commit digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/feedback/
          if git diff --staged --quiet; then
            echo "No digest changes"
          else
            git commit -m "chore: daily beta feedback digest $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Open or update daily tracker issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/post-daily-digest-issue.sh
