name: Daily feedback digest

on:
  # Paused — portfolio mode (re-enable for beta validation)
  # schedule:
  #   - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create beta-feedback --description "Beta tester feedback" --color "1D76DB" 2>/dev/null || true
          gh label create daily-digest --description "Automated daily feedback summary" --color "0E8A16" 2>/dev/null || true

      - name: Collect beta feedback
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sed -i 's/\r$//' scripts/collect-beta-feedback.sh scripts/post-daily-digest-issue.sh
          chmod +x scripts/collect-beta-feedback.sh scripts/post-daily-digest-issue.sh
          bash scripts/collect-beta-feedback.sh

      - name: Commit digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/feedback/
          if git diff --staged --quiet; then
            echo "No digest changes"
          else
            git commit -m "chore: daily beta feedback digest $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Open or update daily tracker issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sed -i 's/\r$//' scripts/post-daily-digest-issue.sh
          bash scripts/post-daily-digest-issue.sh
